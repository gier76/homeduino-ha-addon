<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Homeduino Analysis</title>
    <style>
        body { background: #0a0b10; color: #e0e6ed; font-family: monospace; padding: 20px; }
        .signal-group { border: 1px solid #333; margin-bottom: 20px; padding: 10px; border-radius: 8px; }
        .card { background: #161922; padding: 10px; margin: 5px 0; border-radius: 4px; }
        .raw-data { color: #00f2ff; word-break: break-all; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Signal-Analysator (v4.6.0)</h1>
    <div id="signals"></div>
    <script src="socket.io/socket.io.js"></script>
    <script>
        const socket = io({ path: window.location.pathname.replace(/\/$/, "") + "/socket.io" });
        const container = document.getElementById('signals');
        socket.on('signal_group', (results) => {
            const group = document.createElement('div');
            group.className = 'signal-group';
            results.forEach(res => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <strong>${res.protocol}</strong><br>
                    Values: ${JSON.stringify(res.values)}<br>
                    <div class="raw-data">RAW BITS: ${res.values.raw || 'N/A'}</div>
                `;
                group.appendChild(card);
            });
            container.prepend(group);
        });
    </script>
</body>
</html>
