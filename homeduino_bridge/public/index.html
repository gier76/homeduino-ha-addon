<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homeduino Bridge Controller</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --card-bg: #161922;
            --accent-color: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --text-color: #e0e6ed;
            --secondary-text: #94a3b8;
            --success-color: #10b981;
            --error-color: #ef4444;
            --warning-color: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            background: linear-gradient(180deg, rgba(22, 25, 34, 1) 0%, rgba(10, 11, 16, 0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .status-container { display: flex; gap: 1rem; }
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .badge.online { border-color: var(--success-color); color: var(--success-color); }
        .badge.offline { border-color: var(--error-color); color: var(--error-color); }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1.5rem;
            padding: 1.5rem;
            overflow: hidden;
        }

        .panel {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .panel-title {
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--secondary-text);
        }

        .scroll-area { flex: 1; overflow-y: auto; padding: 1rem; }

        /* Signal Group */
        .signal-group {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            margin-bottom: 1.5rem;
            background: rgba(0,0,0,0.2);
        }
        .group-header {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.04);
            font-size: 0.75rem;
            color: var(--secondary-text);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .group-content { padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        
        .signal-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1rem;
            position: relative;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .protocol-tag {
            background: var(--accent-color);
            color: #000;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .data-item { font-size: 0.85rem; }
        .data-label { color: var(--secondary-text); font-size: 0.7rem; display: block; }
        .data-value { font-family: 'JetBrains Mono', monospace; color: var(--accent-color); }
        .actions { display: flex; gap: 0.5rem; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 0.75rem; }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: var(--accent-color); color: #000; }
        button.primary { background: var(--accent-color); color: #000; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--secondary-text);
            text-align: center;
        }
        .empty-icon { font-size: 3rem; opacity: 0.2; }

        .console { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; }
        .log-entry { margin-bottom: 0.25rem; }
        .log-time { color: #6366f1; }
        .log-type { color: var(--accent-color); font-weight: bold; }

        @keyframes pulse { 50% { opacity: 0.5; } }
        .receiving-indicator {
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent-color);
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <header>
        <h1>HOMEDUINO BRIDGE</h1>
        <div class="status-container">
            <div id="serial-status" class="badge offline">Serial: Offline</div>
            <div id="mqtt-status" class="badge offline">MQTT: Offline</div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Empfangene Signale <span class="receiving-indicator" id="rec-ind" style="display:none"></span></div>
                <button onclick="clearSignals()">Liste leeren</button>
            </div>
            <div id="signals-list" class="scroll-area">
                <div class="empty-state">
                    <div class="empty-icon">📡</div>
                    <p>Warten auf 433MHz Signale...</p>
                </div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header"><div class="panel-title">System Protokoll</div></div>
            <div id="console" class="scroll-area console"><div class="log-entry">Initialisiere...</div></div>
        </div>
    </main>

    <script src="socket.io/socket.io.js"></script>
    <script>
        const socket = io({ 
            path: window.location.pathname.replace(/\/$/, "") + "/socket.io",
            transports: ["polling", "websocket"]
        });

        const signalsList = document.getElementById('signals-list');
        const consoleArea = document.getElementById('console');

        function log(msg, type = 'INFO') {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span class="log-time">[${new Date().toLocaleTimeString()}]</span> <span class="log-type">${type}</span> ${msg}`;
            consoleArea.appendChild(div);
            consoleArea.scrollTop = consoleArea.scrollHeight;
        }

        socket.on('connect', () => log('Mit Bridge-Server verbunden (v3.9.5)'));
        socket.on('mqtt_status', (data) => {
            const el = document.getElementById('mqtt-status');
            el.className = `badge ${data.connected ? 'online' : 'offline'}`;
            el.textContent = `MQTT: ${data.connected ? 'Verbunden' : 'Getrennt'}`;
        });
        socket.on('status', (data) => {
            const el = document.getElementById('serial-status');
            el.className = `badge ${data.error ? 'offline' : 'online'}`;
            el.textContent = `Serial: ${data.error ? 'Fehler' : 'Bereit'}`;
        });

        socket.on('signal_group', (results) => {
            document.getElementById('rec-ind').style.display = 'inline-block';
            setTimeout(() => document.getElementById('rec-ind').style.display = 'none', 500);

            if (document.querySelector('.empty-state')) signalsList.innerHTML = '';

            const groupDiv = document.createElement('div');
            groupDiv.className = 'signal-group';
            
            const groupHeader = document.createElement('div');
            groupHeader.className = 'group-header';
            groupHeader.innerText = `Signal empfangen @ ${new Date(results[0].groupTimestamp).toLocaleTimeString()}`;
            
            const groupContent = document.createElement('div');
            groupContent.className = 'group-content';

            results.forEach(res => {
                groupContent.appendChild(createSignalCard(res));
            });

            groupDiv.appendChild(groupHeader);
            groupDiv.appendChild(groupContent);
            signalsList.insertBefore(groupDiv, signalsList.firstChild);

            while (signalsList.children.length > 20) signalsList.removeChild(signalsList.lastChild);
        });

        function createSignalCard(res) {
            const card = document.createElement('div');
            card.className = 'signal-card';
            
            let dataHtml = '';
            for (const [key, value] of Object.entries(res.values)) {
                if (['id', 'raw'].includes(key)) continue;
                dataHtml += `<div class="data-item"><span class="data-label">${key}</span><span class="data-value">${value}</span></div>`;
            }

            card.innerHTML = `
                <div class="card-top"><span class="protocol-tag">${res.protocol}</span></div>
                <div style="font-size:0.8rem; margin-bottom:0.5rem; color:var(--secondary-text)">${res.identityName}</div>
                <div class="data-grid">${dataHtml}</div>
                <div class="actions">
                    <button class="primary" onclick='addToHA(${JSON.stringify(res)})'>➕ Zu HA</button>
                    ${res.protocol.includes('switch') ? `<button onclick='sendCommand(${JSON.stringify(res)}, "on")'>ON</button><button onclick='sendCommand(${JSON.stringify(res)}, "off")'>OFF</button>` : ''}
                </div>
            `;
            return card;
        }

        function addToHA(res) {
            const name = prompt("Gib einen Namen für das Gerät ein:", res.identityName);
            if (name) {
                const payload = { protocol: res.protocol, values: res.values, name, uid: res.uid };
                socket.emit('add_device', payload);
                log(`Discovery-Befehl für "${name}" gesendet`);
            }
        }

        function sendCommand(res, state) {
            const payload = { ...res.values, state: state === 'on' };
            socket.emit('send_command', { protocol: res.protocol, values: payload });
            log(`Befehl ${state.toUpperCase()} an ${res.identityName} gesendet`);
        }

        function clearSignals() {
            signalsList.innerHTML = `<div class="empty-state"><div class="empty-icon">📡</div><p>Warten auf Signale...</p></div>`;
        }
    </script>
</body>
</html>
