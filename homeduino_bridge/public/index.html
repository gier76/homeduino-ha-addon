<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homeduino Bridge Controller</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --card-bg: #161922;
            --accent-color: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --text-color: #e0e6ed;
            --secondary-text: #94a3b8;
            --success-color: #10b981;
            --error-color: #ef4444;
            --warning-color: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            background: linear-gradient(180deg, rgba(22, 25, 34, 1) 0%, rgba(10, 11, 16, 0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .status-container {
            display: flex;
            gap: 1rem;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .badge.online { border-color: var(--success-color); color: var(--success-color); box-shadow: 0 0 8px rgba(16, 185, 129, 0.2); }
        .badge.offline { border-color: var(--error-color); color: var(--error-color); }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1.5rem;
            padding: 1.5rem;
            overflow: hidden;
        }

        .panel {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .panel-title {
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--secondary-text);
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .signal-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .signal-card:hover {
            border-color: var(--accent-color);
            background: rgba(0, 242, 255, 0.02);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .signal-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-color);
            opacity: 0.5;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .protocol-tag {
            background: var(--accent-color);
            color: #000;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .time-tag {
            font-size: 0.7rem;
            color: var(--secondary-text);
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .data-item {
            font-size: 0.85rem;
        }

        .data-label {
            color: var(--secondary-text);
            font-size: 0.7rem;
            display: block;
        }

        .data-value {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            color: var(--accent-color);
        }

        .actions {
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 0.75rem;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        button:hover {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        button.primary {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--secondary-text);
            text-align: center;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.2;
        }

        .console {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #a5b4fc;
            line-height: 1.4;
        }

        .log-entry { margin-bottom: 0.25rem; }
        .log-time { color: #6366f1; }
        .log-type { color: var(--accent-color); font-weight: bold; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .receiving-indicator {
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent-color);
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>HOMEDUINO <span style="font-weight: 300; opacity: 0.7;">BRIDGE</span></h1>
        </div>
        <div class="status-container">
            <div id="serial-status" class="badge offline">Serial: Offline</div>
            <div id="mqtt-status" class="badge offline">MQTT: Offline</div>
        </div>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Entdeckte Signale <span class="receiving-indicator" id="rec-ind" style="display:none"></span></div>
                <button onclick="clearSignals()">Liste leeren</button>
            </div>
            <div id="signals-list" class="scroll-area">
                <div class="empty-state">
                    <div class="empty-icon">📡</div>
                    <p>Warten auf 433MHz Signale...</p>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">System Protokoll</div>
            </div>
            <div id="console" class="scroll-area console">
                <div class="log-entry">Initialisiere Bridge UI...</div>
            </div>
        </div>
    </main>

    <script src="socket.io/socket.io.js"></script>
    <script>
        const socket = io({ 
            path: window.location.pathname.replace(/\/$/, "") + "/socket.io",
            transports: ["polling", "websocket"]
        });

        const signalsList = document.getElementById('signals-list');
        const consoleArea = document.getElementById('console');
        const serialStatus = document.getElementById('serial-status');
        const mqttStatus = document.getElementById('mqtt-status');
        const recInd = document.getElementById('rec-ind');

        function log(msg, type = 'INFO') {
            const div = document.createElement('div');
            div.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-type">${type}</span> ${msg}`;
            consoleArea.appendChild(div);
            consoleArea.scrollTop = consoleArea.scrollHeight;
        }

        socket.on('connect', () => {
            log('Mit Bridge-Server verbunden (v3.9.0)');
        });

        socket.on('mqtt_status', (data) => {
            mqttStatus.className = `badge ${data.connected ? 'online' : 'offline'}`;
            mqttStatus.textContent = `MQTT: ${data.connected ? 'Verbunden' : 'Getrennt'}`;
            log(`MQTT Status: ${data.connected ? 'Verbunden' : 'Getrennt'}`);
        });

        socket.on('status', (data) => {
            if (data.error) {
                serialStatus.className = 'badge offline';
                serialStatus.textContent = 'Serial: Fehler';
                log(`Serial Fehler: ${data.error}`, 'ERROR');
            } else {
                serialStatus.className = 'badge online';
                serialStatus.textContent = 'Serial: Bereit';
            }
        });

        socket.on('signal', (results) => {
            recInd.style.display = 'inline-block';
            setTimeout(() => { recInd.style.display = 'none'; }, 500);

            if (document.querySelector('.empty-state')) {
                signalsList.innerHTML = '';
            }

            results.forEach(res => {
                addSignalCard(res);
            });
        });

        function addSignalCard(res) {
            const time = new Date().toLocaleTimeString();
            const card = document.createElement('div');
            card.className = 'signal-card';
            
            let dataHtml = '';
            for (const [key, value] of Object.entries(res.values)) {
                if (key === 'id' || key === 'channel' || key === 'state' || key === 'all' || key === 'unit') continue;
                dataHtml += `
                    <div class="data-item">
                        <span class="data-label">${key}</span>
                        <span class="data-value">${value}</span>
                    </div>
                `;
            }

            const uidDisplay = res.uid.replace(`hd_${res.protocol}_`, '');

            card.innerHTML = `
                <div class="card-top">
                    <span class="protocol-tag">${res.protocol}</span>
                    <span class="time-tag">${time}</span>
                </div>
                <div style="margin-bottom: 0.5rem; font-size: 0.8rem; font-weight: 600; color: var(--secondary-text);">
                    UID: <span style="color: var(--accent-color);">${uidDisplay}</span>
                </div>
                <div class="data-grid">
                    ${dataHtml}
                </div>
                <div class="actions">
                    <button class="primary" onclick="addToHA('${res.protocol}', ${JSON.stringify(res.values).replace(/"/g, '&quot;')}, '${res.uid}')">
                        <span>➕</span> In HA hinzufügen
                    </button>
                    ${res.protocol.includes('switch') ? `
                        <button onclick="sendCommand('${res.protocol}', ${JSON.stringify(res.values).replace(/"/g, '&quot;')}, 'on')">ON</button>
                        <button onclick="sendCommand('${res.protocol}', ${JSON.stringify(res.values).replace(/"/g, '&quot;')}, 'off')">OFF</button>
                    ` : ''}
                </div>
            `;

            signalsList.insertBefore(card, signalsList.firstChild);
            
            if (signalsList.children.length > 30) {
                signalsList.removeChild(signalsList.lastChild);
            }
        }

        function addToHA(protocol, values, uid) {
            const name = prompt("Gib einen Namen für das Gerät in Home Assistant ein:", `${protocol} ${uid.split('_').pop()}`);
            if (name) {
                const payload = { protocol, values, name, uid };
                console.log("Emitting add_device:", payload);
                socket.emit('add_device', payload);
                log(`Discovery-Befehl für "${name}" (${uid}) gesendet`);
            }
        }

        function sendCommand(protocol, values, state) {
            socket.emit('send_command', { protocol, values: { ...values, state: state === 'on' } });
            log(`Befehl ${state.toUpperCase()} an ${protocol} gesendet`);
        }

        function clearSignals() {
            signalsList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📡</div>
                    <p>Warten auf 433MHz Signale...</p>
                </div>
            `;
        }
    </script>
</body>
</html>
